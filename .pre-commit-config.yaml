# Dana OS — pre-commit hooks
#
# Install once per clone:
#     uv tool install pre-commit
#     pre-commit install
#
# After that, every `git commit` runs these hooks against staged files.
# CI runs `pre-commit run --all-files` to enforce the same checks in case
# someone bypasses the local hook with --no-verify.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
