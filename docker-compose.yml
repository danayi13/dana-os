# Dana OS — docker compose
#
# Three services: postgres (data), api (FastAPI), web (Vite).
# All services use restart: unless-stopped so they survive reboots.
#
# Dev-server mode: source code is bind-mounted into api and web so
# hot-reload works without rebuilding the image.

services:
  postgres:
    image: postgres:16
    container_name: dana_os_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DANA_OS_APP_PASSWORD: ${DANA_OS_APP_PASSWORD}
      DANA_OS_RO_PASSWORD: ${DANA_OS_RO_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: ./backend
    container_name: dana_os_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override DB URLs to use the postgres service name, not localhost.
      DATABASE_URL: postgresql+psycopg://${DANA_OS_APP_USER:-dana_os_app}:${DANA_OS_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL_RO: postgresql+psycopg://${DANA_OS_RO_USER:-dana_os_ro}:${DANA_OS_RO_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app
      - api_venv:/app/.venv  # keeps container-built venv isolated from host
      - ./secrets:/secrets:ro  # service account keys — never committed
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./frontend
    container_name: dana_os_web
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules  # keeps container node_modules isolated from host
    depends_on:
      - api

volumes:
  postgres_data:
    name: dana_os_postgres_data
  api_venv:
    name: dana_os_api_venv
  web_node_modules:
    name: dana_os_web_node_modules
